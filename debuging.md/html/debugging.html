<!DOCTYPE html>
<html lang="id">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Saya</title> 
</head> 
<body> 

    <h1>Selamat Datang di Toko Kami</h1> 
    
    <h4>Produk Unggulan</h4> 
    
    <!-- PERBAIKAN: Menambahkan titik koma (;) pada style dan menutup tag </p> -->
    <p style="color: red; font-size: 18px;">Kami menjual berbagai produk berkualitas</p>
    
    <!-- PERBAIKAN: Menghapus tag </del> yang salah tempat -->
    <p><strong>Diskon spesial bulan ini!</strong></p>
    
    <h2>Tentang Kami</h2> 
    <p>Kami sudah berdiri sejak <i>2015</i> dan melayani ribuan pelanggan</p>
    
    <!-- PERBAIKAN: Menutup tag img dengan benar (bisa diisi dummy path/gambar nanti) -->
    <img src="produk.jpg" alt="foto produk"> 
    
    <!-- PERBAIKAN: Menambahkan tanda petik pada link Instagram -->
    <p><a href="https://www.instagram.com/tokokami">Instagram Kami</a></p> 
    
    <!-- PERBAIKAN: Mengisi format email tujuan pada mailto -->
    <p>Hubungi kami di <a href="tel:0812345678">sini</a> atau email 
    <a href="mailto:tokokami@email.com">kontak kami</a></p> 
    
    <!-- PERBAIKAN: Menutup tag source dan tag video dengan benar -->
    <video controls> 
        <source src="promo.mp4" type="video/mp4">
        Browser Anda tidak mendukung video.
    </video> 

</body> 
</html>
